<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A browser-based video compressor for GitHub Pages">
    <title>Video Compressor</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="page-title">
        <h1 id="page-title">video compressor</h1>
        <pre class="meta">engine: ffmpeg.wasm
runtime: browser
upload: none
output: mp4</pre>

        <div class="drop-zone" id="dropZone">
          <input id="fileInput" type="file" accept="video/*">
          <div class="drop-copy">
            <strong>input file</strong>
            <span>Select a video file or drop it here.</span>
          </div>
          <button class="secondary" id="pickButton" type="button">Choose file</button>
        </div>

        <h2>preview</h2>
        <div class="preview-grid">
          <section class="panel">
            <div class="panel-heading">
              <h3>input</h3>
              <span id="inputMeta">No file selected</span>
            </div>
            <video id="inputVideo" controls muted playsinline></video>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h3>output</h3>
              <span id="outputMeta">Waiting</span>
            </div>
            <video id="outputVideo" controls playsinline></video>
          </section>
        </div>

        <h2>settings</h2>
        <section class="controls" aria-label="Compression settings">
          <label>
            <span>Quality</span>
            <select id="qualitySelect">
              <option value="28">Smaller file</option>
              <option value="24" selected>Balanced</option>
              <option value="20">Higher quality</option>
            </select>
          </label>

          <label>
            <span>Max width</span>
            <select id="widthSelect">
              <option value="0">Keep original</option>
              <option value="480">480px</option>
              <option value="720" selected>720px</option>
              <option value="1080">1080px</option>
            </select>
          </label>

          <label>
            <span>Audio</span>
            <select id="audioSelect">
              <option value="96k" selected>96kbps</option>
              <option value="128k">128kbps</option>
              <option value="64k">64kbps</option>
              <option value="none">Remove</option>
            </select>
          </label>

          <label>
            <span>Target size MB</span>
            <input id="targetSizeInput" type="number" min="0" step="0.1" inputmode="decimal" placeholder="auto">
          </label>

          <button class="primary" id="compressButton" type="button" disabled>Compress</button>
          <a class="download-link" id="downloadLink" hidden>Download</a>
        </section>

        <h2>status</h2>
        <section class="status-panel" aria-live="polite">
          <div class="status-line">
            <span id="statusText">Select a video to start.</span>
            <span id="progressText">0%</span>
          </div>
          <progress id="progressBar" value="0" max="100"></progress>
          <pre id="logOutput"></pre>
        </section>
      </section>
    </main>
  </body>
</html>
